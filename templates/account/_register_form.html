<form class="auth-form" method="post" action="{% url 'register' %}" {% if is_modal %}data-auth-form="register"{% endif %} novalidate>
    {% csrf_token %}

    {% if form.non_field_errors %}
        <div class="field-errors">
            {{ form.non_field_errors }}
        </div>
    {% endif %}

    {% for field in form %}
        <div class="field-group{% if field.errors %} has-errors{% endif %}">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
                <div class="form-help">{{ field.help_text }}</div>
            {% endif %}
            {% if field.errors %}
                <div class="field-errors">{{ field.errors }}</div>
            {% endif %}
        </div>
    {% endfor %}

    <button class="button button-primary" type="submit">Create Account</button>
</form>

<p class="auth-switch">
    Already have an account?
    <a href="{% url 'login' %}" {% if is_modal %}data-auth-modal="login"{% endif %}>Login</a>
</p>
